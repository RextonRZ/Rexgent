# Production-shaped base. Local dev is layered on by docker-compose.override.yml
# (auto-loaded), which adds live-reload volumes and dev commands — so plain
# `docker compose up` keeps working exactly as before.
#
# Deploy (server): docker compose -f docker-compose.yml up -d --build
#   with PUBLIC_API_URL / FRONTEND_ORIGIN exported (see README → Deploy).
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:socket_app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is baked at build time — set to the server's API URL.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    command: npm run start

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rexgent
      POSTGRES_PASSWORD: rexgent_dev
      POSTGRES_DB: rexgent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rexgent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/rexgent_dev
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
